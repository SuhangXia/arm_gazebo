sensors:
  - sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
    point_cloud_topic: /camera/depth/points    # 确保这和 Gazebo 发布的 Topic 一致
    max_range: 2.5                            # 探测最大距离（米），分拣建议设短一点
    point_subsample: 1                        # 采样频率，1 为全采样
    padding_offset: 0.01                      # 避开机器人自身的碰撞体积
    padding_scale: 1.0
    max_update_rate: 2.0                      # 每秒更新频率，建议 1.0-2.0 减轻 Docker 负担
    filtered_cloud_topic: filtered_cloud